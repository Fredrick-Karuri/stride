name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ordo-linux
          - os: macos-latest
            artifact: ordo-macos
          - os: windows-latest
            artifact: ordo-windows.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build binary
        run: pyinstaller --onefile --name ${{ matrix.artifact }} --clean ordo/cli.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "ordo v${{ steps.version.outputs.version }}"
          body: |
            ## Install

            Download the binary for your platform and put it on your PATH.

            | Platform | File |
            |---|---|
            | macOS | `ordo-macos` |
            | Linux | `ordo-linux` |
            | Windows | `ordo-windows.exe` |

            Or install via PyPI:
            ```bash
            pipx install ordo-cli
            ```
          files: |
            dist/ordo-linux/ordo-linux
            dist/ordo-macos/ordo-macos
            dist/ordo-windows.exe/ordo-windows.exe