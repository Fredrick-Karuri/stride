groups:
  dev:
    description: Development
    commands:
      install:
        description: Install in editable mode with dev deps
        run: "pip install -e '.[dev]'"

  test:
    description: Test suite
    commands:
      run:
        description: Run all tests
        run: "pytest"
      cov:
        description: Run tests with coverage report
        run: "pytest --cov=ordo --cov-report=term-missing"

  lint:
    description: Code quality
    commands:
      check:
        description: Check for lint errors
        run: "ruff check ."
      fix:
        description: Auto-fix lint errors
        run: "ruff check . --fix"

  release:
    description: Publishing
    commands:
      build:
        description: Build distribution packages
        run: "python -m build"
      publish:
        description: Upload to PyPI
        run: "twine upload dist/*"
      validate:
        description: Validate config before release
        run: "ordo validate"